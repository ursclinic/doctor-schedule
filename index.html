<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>醫師班表</title>
  <style>
    body {
      margin: 0;
      background: #f4f7f6;
      color: #17211f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    }

    header {
      padding: 24px;
      background: white;
      border-bottom: 1px solid #d9e2df;
    }

    .topbar, main {
      max-width: 1120px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .meta, .status {
      color: #66736f;
      font-size: 14px;
    }

    main {
      padding: 24px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    select, button {
      min-height: 40px;
      border-radius: 6px;
      font: inherit;
      padding: 0 12px;
    }

    button {
      border: 1px solid #197278;
      background: #197278;
      color: white;
      cursor: pointer;
    }

    select {
      border: 1px solid #d9e2df;
      background: white;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .weekday {
      color: #66736f;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .day {
      min-height: 132px;
      background: white;
      border: 1px solid #d9e2df;
      border-radius: 8px;
      padding: 10px;
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
    }

    .date {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .doctor {
      display: block;
      margin-top: 6px;
      padding: 7px 8px;
      border-radius: 6px;
      background: #e2f2f1;
      color: #197278;
      font-size: 13px;
      line-height: 1.35;
    }

    .doctor.partial {
      background: #fff3d9;
      color: #8a5a13;
    }

    .doctor-name {
      font-weight: 800;
    }

    .doctor-time {
      display: block;
      margin-top: 2px;
    }

    .error {
      display: none;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid #f3b8b3;
      border-radius: 8px;
      background: white;
      color: #b42318;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .calendar {
        grid-template-columns: 1fr;
      }

      .weekday, .day.empty {
        display: none;
      }

      .day {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1 id="pageTitle">醫師班表</h1>
        <div class="meta" id="sourceLabel"></div>
      </div>
      <div>
        <select id="monthSelect">
          <option value="2604">2026/04</option>
          <option value="2605">2026/05</option>
          <option value="2606">2026/06</option>
        </select>
        <button type="button" id="refreshButton">重新整理</button>
      </div>
    </div>
  </header>

  <main>
    <div id="error" class="error"></div>
    <div class="toolbar">
      <div class="status" id="status">尚未載入</div>
      <div class="status">每 10 秒自動更新</div>
    </div>
    <section class="calendar" id="calendar"></section>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby95ijwscdTkEVB8XhP_xuy2sVJt7OWt9tySfh0coMrJ5kI1IW5j1FXydN7vVpmBqmI/exec";

    const monthSettings = {
      "2604": {
        title: "2026 年 4 月醫師班表",
        source: "2604",
        month: 4,
        firstDayWeekday: 3,
        daysInMonth: 30
      },
      "2605": {
        title: "2026 年 5 月醫師班表",
        source: "2605",
        month: 5,
        firstDayWeekday: 5,
        daysInMonth: 31
      },
      "2606": {
        title: "2026 年 6 月醫師班表",
        source: "2606",
        month: 6,
        firstDayWeekday: 1,
        daysInMonth: 30
      }
    };

    const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
    const calendar = document.getElementById("calendar");
    const status = document.getElementById("status");
    const errorBox = document.getElementById("error");
    const refreshButton = document.getElementById("refreshButton");
    const monthSelect = document.getElementById("monthSelect");
    const pageTitle = document.getElementById("pageTitle");
    const sourceLabel = document.getElementById("sourceLabel");

    function buildApiUrl(sheetName) {
      return API_URL + "?sheet=" + encodeURIComponent(sheetName);
    }

    function formatDoctor(doctor) {
      const name = doctor.name || doctor.code || "";
      const isFullDay = doctor.start === "12:30" && doctor.end === "20:30";
      const time = isFullDay ? "全天 12:30-20:30" : `${doctor.start}-${doctor.end}`;
      const className = isFullDay ? "doctor" : "doctor partial";

      return `
        <span class="${className}">
          <span class="doctor-name">${name}</span>
          <span class="doctor-time">${time}</span>
        </span>
      `;
    }

    function renderSchedule(rows, settings) {
      const byDay = new Map(rows.map(row => [Number(row.day), row]));
      const cells = [];

      weekdays.forEach(day => {
        cells.push(`<div class="weekday">${day}</div>`);
      });

      for (let i = 0; i < settings.firstDayWeekday; i++) {
        cells.push(`<div class="day empty"></div>`);
      }

      for (let day = 1; day <= settings.daysInMonth; day++) {
        const row = byDay.get(day);
        const weekday = row ? row.weekday : weekdays[(settings.firstDayWeekday + day - 1) % 7];
        const doctors = row && row.doctors.length
          ? row.doctors.map(formatDoctor).join("")
          : `<span class="meta">未排診</span>`;

        cells.push(`
          <article class="day">
            <div class="date">
              <span>${settings.month}/${day}</span>
              <span class="meta">${weekday}</span>
            </div>
            ${doctors}
          </article>
        `);
      }

      calendar.innerHTML = cells.join("");
    }

    function selectCurrentMonth() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const sheetName = String(year).slice(2) + String(month).padStart(2, "0");

      if (monthSettings[sheetName]) {
        monthSelect.value = sheetName;
      }
    }

    async function loadSchedule() {
      try {
        errorBox.style.display = "none";
        status.textContent = "讀取中...";

        const sheetName = monthSelect.value;
        const settings = monthSettings[sheetName];

        pageTitle.textContent = settings.title;
        sourceLabel.textContent = `資料來源：Google Sheet「${settings.source}」`;

        const response = await fetch(buildApiUrl(sheetName));
        const rows = await response.json();

        if (!Array.isArray(rows)) {
          throw new Error(rows.error || "API 回傳格式錯誤");
        }

        renderSchedule(rows, settings);
        status.textContent = `最後更新：${new Date().toLocaleString("zh-TW")}`;
      } catch (error) {
        errorBox.style.display = "block";
        errorBox.textContent = `讀取失敗：${error.message}`;
        status.textContent = "更新失敗";
      }
    }

    refreshButton.addEventListener("click", loadSchedule);
    monthSelect.addEventListener("change", loadSchedule);
    selectCurrentMonth();
    loadSchedule();
    setInterval(loadSchedule, 10000);
  </script>
</body>
</html>
