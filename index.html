<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>醫師班表</title>
  <style>
    body {
      margin: 0;
      background: #f4f7f6;
      color: #17211f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    }

    header {
      padding: 24px;
      background: white;
      border-bottom: 1px solid #d9e2df;
    }

    .topbar, main {
      max-width: 1120px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .meta, .status {
      color: #66736f;
      font-size: 14px;
    }

    main {
      padding: 24px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    select, button {
      min-height: 40px;
      border-radius: 6px;
      font: inherit;
      padding: 0 12px;
    }

    button {
      border: 1px solid #197278;
      background: #197278;
      color: white;
      cursor: pointer;
    }

    select {
      border: 1px solid #d9e2df;
      background: white;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .weekday {
      color: #66736f;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .day {
      min-height: 132px;
      background: white;
      border: 1px solid #d9e2df;
      border-radius: 8px;
      padding: 10px;
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
    }

    .date {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .doctor {
      display: block;
      margin-top: 6px;
      padding: 7px 8px;
      border-radius: 6px;
      background: #e2f2f1;
      color: #197278;
      font-size: 13px;
      line-height: 1.35;
    }

    .doctor.partial {
      background: #fff3d9;
      color: #8a5a13;
    }

    .doctor-name {
      font-weight: 800;
    }
